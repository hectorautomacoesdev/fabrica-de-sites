name: Deploy da documentação

# Publica o site MkDocs no GitHub Pages a cada push em main.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
  workflow_dispatch: {}

# Permissões mínimas necessárias para o deploy no Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um deploy por vez (sem cancelar um em andamento).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependências da doc
        run: pip install -e ".[docs]"
      - name: Build (modo estrito — falha em qualquer aviso)
        run: mkdocs build --strict
      - name: Empacotar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
