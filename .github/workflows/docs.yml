name: Deploy da documentação

# Publica no GitHub Pages, a cada push em main, DOIS sites a partir da fonte única docs/:
#   - MkDocs (vitrine pública)            -> raiz   (/)
#   - App React (doc rica)                -> /app/
# Uma mudança em docs/ atualiza os dois (ambos leem os mesmos arquivos Markdown).
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-app/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
  workflow_dispatch: {}

# Permissões mínimas necessárias para o deploy no Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um deploy por vez (sem cancelar um em andamento).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 1) Site MkDocs (vitrine pública) → site/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependências da doc
        run: pip install -e ".[docs]"
      - name: Build MkDocs (modo estrito — falha em qualquer aviso)
        run: mkdocs build --strict
      # 2) App React (doc rica) → site/app/  (mesmo Pages, subcaminho /app/)
      #    O build também VALIDA que o React compila lendo a fonte única docs/.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs-app/package-lock.json
      - name: Instalar dependências da doc React
        run: npm ci
        working-directory: docs-app
      - name: Build da doc React
        run: npm run build
        working-directory: docs-app
      - name: Publicar a doc React em /app
        run: |
          mkdir -p site/app
          cp -r docs-app/dist/. site/app/
      # 3) Empacota tudo (MkDocs na raiz + React em /app) para o Pages
      - name: Empacotar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
